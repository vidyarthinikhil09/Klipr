name: AutoShorts Daily Run

on:
  schedule:
    # Run daily at 10:00 AM UTC (adjust to your timezone)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "pycaps[all] @ git+https://github.com/francozanardi/pycaps.git"
      
      - name: Create .env file
        working-directory: backend
        run: |
          cat > .env << EOF
          DEBUG=false
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          EOF
      
      - name: Create directories
        run: |
          mkdir -p temp output data
      
      - name: Test pipeline modules
        working-directory: backend
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('Testing imports...')
          from app.services.clip_finder import ClipFinder
          from app.services.transcriber import Transcriber
          from app.services.metadata_generator import MetadataGenerator
          from app.services.renderer import Renderer, PYCAPS_AVAILABLE
          
          print(f'✓ ClipFinder OK')
          print(f'✓ Transcriber OK')
          print(f'✓ MetadataGenerator OK')
          print(f'✓ Renderer OK (pycaps: {PYCAPS_AVAILABLE})')
          print('All modules loaded successfully!')
          "
      
